# Frontend container: serves the built SPA and reverse-proxies the API to the
# backend over the internal Docker network (the backend is never exposed
# publicly). The host nginx terminates TLS and forwards the domain here.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # allow photo uploads
    client_max_body_size 25m;

    # API → Django backend (same Docker network). Keep the /api prefix; the
    # backend serves its routes under /api/.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA: hash-router app, so everything falls back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # cache hashed build assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
